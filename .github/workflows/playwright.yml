name: "Playwright Tests & Allure Report"

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    # 1. ── CHANGE THIS TO SELF-HOSTED ──
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]
    env:
      CI: true

    defaults:
      run:
        working-directory: project1-pom

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: project1-pom/package-lock.json

      - name: Install Dependencies
        run: npm install

      # 2. ── FORCE CHROMIUM ONLY ──
      - name: Install Playwright Chromium Browser
        run: npx playwright install chromium --with-deps

      # 3. ── RUN CHROMIUM PROJECT ONLY ──
      - name: Run Playwright Tests
        run: npm run test:ci -- --project=chromium --shard=${{ matrix.shard_index }}/3
        continue-on-error: true

      - name: Upload Allure Raw Results (Shard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard_index }}
          path: project1-pom/allure-results
          if-no-files-found: warn
          retention-days: 14

  report:
    if: always()
    needs: [test]
    timeout-minutes: 30
    # You can leave the report job on ubuntu-latest! 
    # Generating a report doesn't require bypassing Cloudflare, 
    # so let GitHub's servers do the heavy lifting here.
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project1-pom

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: project1-pom/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Download Allure Raw Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          merge-multiple: true
          path: project1-pom/allure-results

      - name: Generate Allure Report
        run: npm run allure:generate
        continue-on-error: true

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: project1-pom/allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: project1-pom/allure-report
        continue-on-error: true